name: Go Tests

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  test:
    name: Run unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # Check out repository code so the workflow can run tests against the commit.
      - name: Check out repository
        uses: actions/checkout@v6

      # Install the Go version declared in the repository module for consistent CI behavior.
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # Run the full Go test suite for all packages in this repository.
      - name: Run test suite
        run: make test

      # Run the same tests with Go's race detector. This is dynamic testing,
      # not static analysis, so it lives with the normal test workflow.
      - name: Run race test suite
        run: make race
